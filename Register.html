<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Register - SIDAS</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="auth-container">

<h2>Create Account</h2>

<p class="error" th:if="${error}" th:text="${error}"></p>

<form th:action="@{/register}" th:object="${user}" method="post">

<div class="input-group">
<label>Name</label>
<input type="text" th:field="*{name}" placeholder="Enter name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" th:field="*{email}" placeholder="Enter email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" th:field="*{password}" placeholder="Enter password" required>
</div>

<button class="btn" type="submit">Register</button>

</form>

<div class="link">
<p>Already have an account?
<a th:href="@{/login}">Login</a>
</p>
</div>

</div>

</body>
</html>
